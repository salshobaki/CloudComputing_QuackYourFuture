AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: QuackYourFuture — uploadCV and tailorCV Lambda functions + HTTP API

# ─── Shared defaults ──────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [x86_64]
    CodeUri: .
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
        PROFILES_BUCKET: quackurfuture-profiles
        OUTPUTS_BUCKET:  quackurfuture-outputs
        SECRET_NAME:     quackurfuture/API-key
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"                         # tighten to your Vercel URL in production
      AllowHeaders:
        - Content-Type
        - Authorization
      AllowMethods:
        - GET
        - POST
        - OPTIONS

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:

  # ── Shared HTTP API (one API Gateway for both functions) ────────────────────
  QuackApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  # ── uploadCV ────────────────────────────────────────────────────────────────
  UploadCVFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quackurfuture-uploadCV
      Handler: uploadCV.handler
      # File parsing (pdf-parse / mammoth) + LLM call; keep memory high enough
      # for in-memory PDF buffers.
      Timeout: 120        # NOTE: API Gateway hard-limits sync calls to 29 s;
      MemorySize: 1024    #       see "Known limits" note below.
      Policies:
        - S3CrudPolicy:
            BucketName: quackurfuture-profiles
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:quackurfuture/API-key*"
      Events:
        UploadCV:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuackApi
            Path:  /upload-cv
            Method: POST

  # ── tailorCV ────────────────────────────────────────────────────────────────
  TailorCVFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quackurfuture-tailorCV
      Handler: tailorCV.handler
      Timeout: 120
      MemorySize: 512
      Policies:
        - S3ReadPolicy:
            BucketName: quackurfuture-profiles
        - S3CrudPolicy:
            BucketName: quackurfuture-outputs
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:quackurfuture/API-key*"
      Events:
        TailorCV:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuackApi
            Path:  /tailor-cv
            Method: POST

# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: "Base URL — set this as VITE_API_URL in Vercel"
    Value: !Sub "https://${QuackApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  UploadCVEndpoint:
    Description: "POST multipart/form-data  field: file (PDF/DOCX)"
    Value: !Sub "https://${QuackApi}.execute-api.${AWS::Region}.amazonaws.com/prod/upload-cv"

  TailorCVEndpoint:
    Description: "POST application/json  body: { profileKey, jobDescription }"
    Value: !Sub "https://${QuackApi}.execute-api.${AWS::Region}.amazonaws.com/prod/tailor-cv"

# ─── Known limits ─────────────────────────────────────────────────────────────
# API Gateway HTTP API has a hard 29-second integration timeout.
# If the LLM takes longer than 29 s the client receives a 504 even though
# the Lambda keeps running. For a university project this is usually fine
# (DeepSeek is fast), but if you hit timeouts:
#   Option A — switch to async: return 202 immediately, poll a status endpoint.
#   Option B — expose the Lambda via a Function URL instead of API Gateway
#              (no timeout limit on the HTTP side).
