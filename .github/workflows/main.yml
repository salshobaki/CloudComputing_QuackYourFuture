name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t 855374748771.dkr.ecr.us-east-1.amazonaws.com/quackurfuture:latest \
            --push \
            .

      - name: Deploy to EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=quackurfuture-server" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 855374748771.dkr.ecr.us-east-1.amazonaws.com",
              "docker pull 855374748771.dkr.ecr.us-east-1.amazonaws.com/quackurfuture:latest",
              "docker stop quackurfuture || true",
              "docker rm quackurfuture || true",
              "docker run -d --name quackurfuture --restart unless-stopped -p 80:3000 -e AWS_REGION=us-east-1 855374748771.dkr.ecr.us-east-1.amazonaws.com/quackurfuture:latest"
            ]'
